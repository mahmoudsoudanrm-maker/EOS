.ni.active{color:#f0ede6;background:#252521;border-left-color:#d4a843}
.nc{margin-left:auto;font-size:9px;background:#2a2a27;color:#555;padding:1px 5px;border-radius:6px}
.sf{margin-top:auto;padding:12px 14px;font-size:9px;color:#333;border-top:1px solid #222}
/* Main */
.main{overflow:auto}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar h1{font-size:15px;font-weight:bold}
.content{padding:16px}
/* Buttons */
.btn{padding:6px 12px;font-size:11px;border-radius:3px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;transition:all .12s}
.btn:hover{background:#f0ede6}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#142d52}
.btn-sm{padding:3px 8px;font-size:10px}
.btn-day{padding:6px 14px;font-size:11px;border-radius:3px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:inherit}
.btn-day.active{background:var(--accent);color:#fff;border-color:var(--accent)}
/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:14px;margin-bottom:10px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.card-title{font-size:13px;font-weight:bold}
/* Stats */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:10px;text-align:center}
.sv{font-size:22px;font-weight:bold;font-family:'Courier New',monospace;color:var(--accent)}
.sl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-top:2px}
/* Glance table */
.glance-wrap{overflow-x:auto;margin-bottom:14px}
.glance-table{border-collapse:collapse;min-width:900px;width:100%;font-size:10px}
.glance-table th{padding:6px 8px;text-align:center;color:#fff;font-size:9px;letter-spacing:.5px;white-space:nowrap}
.glance-table td.time-col{font-family:'Courier New',monospace;font-size:10px;color:var(--muted);padding:4px 6px;border:1px solid var(--border);white-space:nowrap;vertical-align:top}
.glance-table td.hall-cell{border:1px solid var(--border);padding:4px 6px;vertical-align:top;font-size:10px;cursor:pointer;transition:background .1s}
.glance-table td.hall-cell:hover{opacity:.85}
.cell-num{font-family:'Courier New',monospace;font-size:9px;color:#999}
.cell-name{font-size:10px;line-height:1.3;margin-top:1px}
/* Session list */
.sess-row{display:grid;grid-template-columns:40px 80px 1fr 100px 80px auto;gap:6px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:11px}
.sess-row:last-child{border-bottom:none}
.snum{font-family:'Courier New',monospace;font-weight:bold;color:var(--accent)}
.stime{font-family:'Courier New',monospace;color:var(--muted);font-size:10px}
/* Hall badge */
.hbadge{font-size:9px;padding:2px 6px;border-radius:2px;color:#fff;white-space:nowrap}
/* Day tabs */
.day-tabs{display:flex;gap:6px;margin-bottom:14px}
/* Form */
label{font-size:10px;color:var(--muted);display:block;margin-bottom:2px;margin-top:8px;letter-spacing:.5px;text-transform:uppercase}
label:first-child{margin-top:0}
input,select,textarea{width:100%;font-size:12px;font-family:inherit;color:var(--text);background:#fafaf8;border:1px solid var(--border);border-radius:3px;padding:6px 8px;outline:none}
input:focus,select:focus{border-color:var(--accent)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}

.th-b{background:var(--hallB)}
.th-c{background:var(--hallC)}
.th-1{background:var(--hall1)}
.th-2{background:var(--hall2)}
.th-3{background:var(--hall3)}
.th-4{background:var(--hall4)}
.th-5{background:var(--hall5)}

.bg-c{background:#eef5ef}

.bg-2{background:#f0eef8}

.bg-4{background:#f5f3e8}
.bg-5{background:#eef3f5}

.badge-break{background:#f5f5f5;color:#999;font-size:9px;padding:1px 5px;border-radius:2px}
.toast{position:fixed;bottom:16px;right:16px;background:#1a1916;color:#fff;padding:8px 14px;border-radius:4px;font-size:11px;z-index:999;display:none}

// AT A GLANCE
function renderGlance(){
  const times_wed=['10:00','10:30','11:00','11:30','12:00','12:30','13:00','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00'];
  const times_thu=['09:00','09:30','10:00','10:30','11:00','11:30','12:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00'];
  const times_fri=['09:30','10:00','10:30','11:00','11:30','12:00','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00'];
  const timeSets={wed:times_wed,thu:times_thu,fri:times_fri};
  const times=timeSets[currentDay];
  const daySessions=sessions.filter(s=>s.day===currentDay&&s.hall);

  function getCell(hall,timeSlot){
    const s=daySessions.find(s=>s.hall===hall&&s.start<=timeSlot&&(s.end>timeSlot||!s.end));
    if(!s)return'<td class="hall-cell"></td>';
    const h=hallInfo(hall);
    return`<td class="hall-cell bg-${h.cls}" title="${s.name}">
      <div class="cell-num">#${s.num}</div>
      <div class="cell-name">${s.name.length>60?s.name.slice(0,58)+'…':s.name}</div>
    </td>`;
  }

  document.getElementById('page-content').innerHTML=`
  <div class="day-tabs">
    ${DAYS.map(d=>`<button class="btn-day${currentDay===d.key?' active':''}" onclick="currentDay='${d.key}';renderGlance()">${d.label}</button>`).join('')}
  </div>
  <div class="glance-wrap">
    <table class="glance-table">
      <tr>
        <th style="background:#1a1916;min-width:70px">TIME</th>
        ${HALLS.map(h=>`<th class="th-${h.cls}" style="min-width:110px">${h.name}<br><span style="font-weight:normal;font-size:8px">«${h.sub}»</span></th>`).join('')}
      </tr>
      ${times.map(t=>{
        const brk=sessions.find(s=>s.day===currentDay&&s.type==='Break'&&s.start===t);
        if(brk)return`<tr><td class="time-col">${t}</td><td colspan="8" class="bg-break">${brk.name}</td></tr>`;
        return`<tr>
          <td class="time-col">${t}</td>
          ${HALLS.map(h=>getCell(h.key,t)).join('')}
        </tr>`;
      }).join('')}
    </table>
  </div>`;
}

    ${DAYS.map(d=>`<button class="btn-day${currentDay===d.key?' active':''}" onclick="currentDay='${d.key}';renderSessions()">${d.label}</button>`).join('')}
    <span style="margin-left:8px;font-size:11px;color:var(--muted);align-self:center">${daySessions.length} sessions</span>
  </div>
  <div class="card" style="padding:8px 14px">

      const h=hallInfo(s.hall);
      return`<div class="sess-row">
        <span class="snum">${String(s.num).padStart(3,'0')}</span>
        <span class="stime">${s.start}${s.end?' – '+s.end:''}</span>

function saveNewSession(){
  const num=parseInt(document.getElementById('sf-num').value);
  const name=document.getElementById('sf-name').value.trim();
  if(!name||!num){toast('Number and name required');return;}
  sessions.push({id:Date.now(),day:document.getElementById('sf-day').value,num,name,hall:document.getElementById('sf-hall').value,start:document.getElementById('sf-start').value,end:document.getElementById('sf-end').value,type:document.getElementById('sf-type').value});
  sessions.sort((a,b)=>a.num-b.num);
  toast('Session added!');renderSessions();
}

  const s=sessions.find(x=>x.id===id);if(!s)return;
  document.getElementById('sess-form-area').innerHTML=`
  <div class="card" style="border-color:var(--accent);margin-bottom:10px">
    <div class="card-hd"><span class="card-title">Edit Session #${s.num}</span><button class="btn btn-sm" onclick="renderSessions()">Cancel</button></div>

function saveEditSession(id){
  const s=sessions.find(x=>x.id===id);
  s.name=document.getElementById('esf-name').value;
  s.hall=document.getElementById('esf-hall').value;
  s.type=document.getElementById('esf-type').value;
  s.start=document.getElementById('esf-start').value;
  s.end=document.getElementById('esf-end').value;
  toast('Saved!');renderSessions();
}

function saveEditDr(id){
  const d=doctors.find(x=>x.id===id);
  d.name=document.getElementById('edf-name').value;
  d.specialty=document.getElementById('edf-spec').value;
  d.email=document.getElementById('edf-email').value;
  d.phone=document.getElementById('edf-phone').value;
  toast('Saved!');renderDoctors();
}

// TALKS
function renderTalks(){
  document.getElementById('page-content').innerHTML=`
  <div id="talk-form-area"></div>
  <div class="day-tabs">
    ${DAYS.map(d=>`<button class="btn-day${currentDay===d.key?' active':''}" onclick="currentDay='${d.key}';renderTalks()">${d.label}</button>`).join('')}
  </div>
  ${talks.filter(t=>sessions.find(s=>s.id===t.sessionId&&s.day===currentDay)).length===0?
  '<div class="card"><div style="text-align:center;padding:20px;color:var(--muted);font-style:italic">No talks added for this day yet.</div></div>':
  '<div class="card"><div style="font-size:11px;color:var(--muted);font-style:italic;padding:8px 0">Talks for '+DAYS.find(d=>d.key===currentDay).label+'</div>'+
  talks.filter(t=>sessions.find(s=>s.id===t.sessionId&&s.day===currentDay)).map(t=>{
    const s=sessions.find(x=>x.id===t.sessionId);
    const d=doctors.find(x=>x.id===t.drId);
    return`<div style="display:grid;grid-template-columns:60px 60px 1fr 160px 60px auto;gap:6px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:11px">
      <span style="font-family:monospace;font-size:10px;color:var(--muted)">${t.code||'—'}</span>
      <span style="font-family:monospace;color:var(--muted);font-size:10px">${t.start||''}${t.end?' – '+t.end:''}</span>
      <span>${t.title}</span>
      <span style="font-weight:bold;color:var(--accent);font-size:10px">${d?'Dr. '+d.name:'—'}</span>
      <span style="font-size:10px;color:var(--muted)">${t.duration||''}m</span>
      <button class="btn btn-sm" onclick="deleteTalk('${t.code}')">✕</button>
    </div>`;
  }).join('')+'</div>'}
  <div style="margin-top:10px"><div id="add-talk-form-inline"></div></div>`;
}

function addTalkForm(){
  document.getElementById('talk-form-area').innerHTML=`
  <div class="card" style="border-color:var(--accent);margin-bottom:10px">
    <div class="card-hd"><span class="card-title">New Talk / Presentation</span><button class="btn btn-sm" onclick="renderTalks()">Cancel</button></div>
    <div class="g3">
      <div><label>Talk Code</label><input id="tf-code" placeholder="e.g. EOS-001-01"></div>
      <div><label>Session</label><select id="tf-sess" style="font-size:11px">${sessions.filter(s=>s.day===currentDay&&s.hall).map(s=>`<option value="${s.id}">#${s.num} ${s.name.slice(0,40)}</option>`).join('')}</select></div>
      <div><label>Doctor</label><select id="tf-dr"><option value="">— No doctor —</option>${doctors.map(d=>`<option value="${d.id}">${d.id} – ${d.name}</option>`).join('')}</select></div>
    </div>
    <div style="margin-top:8px"><label>Presentation Title</label><input id="tf-title"></div>
    <div class="g3" style="margin-top:8px">
      <div><label>Start</label><input type="time" id="tf-start"></div>
      <div><label>End</label><input type="time" id="tf-end"></div>
      <div><label>Duration (min)</label><input type="number" id="tf-dur" value="15"></div>
    </div>
    <div style="margin-top:10px"><button class="btn btn-primary" onclick="saveTalk()">Add Talk</button></div>
  </div>`;
}

function saveTalk(){
  const code=document.getElementById('tf-code').value.trim();
  const title=document.getElementById('tf-title').value.trim();
  if(!code||!title){toast('Code and title required');return;}
  talks.push({code,sessionId:parseInt(document.getElementById('tf-sess').value),drId:parseInt(document.getElementById('tf-dr').value)||null,title,start:document.getElementById('tf-start').value,end:document.getElementById('tf-end').value,duration:parseInt(document.getElementById('tf-dur').value)||15,webcast:null});
  toast('Talk added!');renderTalks();
}

function deleteTalk(code){
  if(!confirm('Delete?'))return;
  talks=talks.filter(t=>t.code!==code);toast('Deleted');renderTalks();
}

// FULL PROGRAM
function renderProgram(){
  document.getElementById('page-content').innerHTML=`
  <div class="day-tabs">
    ${DAYS.map(d=>`<button class="btn-day${currentDay===d.key?' active':''}" onclick="currentDay='${d.key}';renderProgram()">${d.label}</button>`).join('')}
  </div>
  <div class="card" style="text-align:center;padding:16px;margin-bottom:10px">
    <div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)">International Congress of the Egyptian Ophthalmological Society</div>
    <div style="font-size:20px;font-weight:bold;color:var(--accent);margin:4px 0">EOS 2026</div>
    <div style="font-size:12px;color:var(--muted)">29 April – 1 May 2026 · InterContinental Citystars, Cairo, Egypt</div>
    <div style="font-size:13px;font-weight:bold;margin-top:6px">${DAYS.find(d=>d.key===currentDay).label}</div>
  </div>
  ${sessions.filter(s=>s.day===currentDay).sort((a,b)=>a.num-b.num).map(s=>{
    const h=hallInfo(s.hall);
    const stk=talks.filter(t=>t.sessionId===s.id);
    return`<div style="border:1px solid var(--border);border-radius:4px;margin-bottom:8px;overflow:hidden">
      <div style="background:#1a1916;color:#f0ede6;padding:8px 12px;display:flex;align-items:center;gap:8px">
        <span style="font-family:monospace;font-size:14px;color:#888;min-width:36px">${String(s.num).padStart(3,'0')}</span>
        <div style="flex:1">
          <div style="font-size:12px;font-weight:bold">${s.name}</div>
          <div style="font-size:10px;color:#888;margin-top:1px">${s.hall?h.name+' «'+h.sub+'»':''} ${s.start?' | '+s.start+(s.end?' – '+s.end:''):''}</div>
        </div>
        ${typeBadge(s.type)}
      </div>
      ${stk.length?stk.map(t=>{const d=doctors.find(x=>x.id===t.drId);return`<div style="display:grid;grid-template-columns:80px 50px 1fr 60px;gap:6px;padding:7px 12px;border-bottom:1px solid var(--border);font-size:11px">
        <span style="font-family:monospace;color:var(--muted);font-size:10px">${t.start||''}${t.end?' – '+t.end:''}</span>
        <span style="font-family:monospace;font-size:9px;color:#ccc">${t.code}</span>
        <div><div style="font-weight:bold;color:var(--accent)">${d?'Dr. '+d.name:'—'}</div><div style="color:var(--muted);font-style:italic;font-size:10px">${t.title}</div></div>
        <span style="text-align:right;color:var(--muted);font-size:10px">${t.duration}m</span>
      </div>`;}).join(''):''}
    </div>`;
  }).join('')}
  <div style="margin-top:12px;text-align:center">
    <button class="btn btn-primary" onclick="sendPrompt('Please generate a full PDF of the EOS 2026 scientific program for '+(['wed','Thu 30 Apr','fri'][['wed','thu','fri'].indexOf(currentDay)])+ ' with all sessions and talks. Use the At a Glance format similar to the uploaded files.')">Export PDF ↗</button>
  </div>`;
}

// CONSENT
function renderConsent(){
  document.getElementById('page-content').innerHTML=`
  <div class="card" style="margin-bottom:10px">
    <div style="font-size:12px;color:var(--muted);font-style:italic">Select a doctor to generate their consent form. Doctors must be added first in the Doctors section.</div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
    <label style="text-transform:none;letter-spacing:0;margin:0;font-size:12px;display:inline;color:var(--text)">Doctor:</label>
    <select onchange="showConsent(this.value)" style="width:260px">
      <option value="">— Select doctor —</option>
      ${doctors.map(d=>`<option value="${d.id}">${d.id} – ${d.name}</option>`).join('')}
    </select>
  </div>
  <div id="consent-out"><div style="text-align:center;padding:30px;color:var(--muted);font-style:italic">Select a doctor above.</div></div>`;
}

function showConsent(drId){
  if(!drId)return;
  const d=doctors.find(x=>x.id===parseInt(drId));if(!d)return;
  const dTalks=talks.filter(t=>t.drId===d.id);
  document.getElementById('consent-out').innerHTML=`
  <div style="border:2px solid #1a1916;border-radius:5px;padding:18px;background:#fff">
    <div style="font-size:16px;font-weight:bold;border-bottom:2px solid #1a1916;padding-bottom:8px;margin-bottom:12px">Consent Form — EOS 2026</div>
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
      <div style="font-size:16px;font-weight:bold">${d.name}</div>
      <div style="font-family:monospace;font-size:16px;font-weight:bold;color:var(--muted)">${d.id}</div>
    </div>
    <div style="font-size:10px;font-style:italic;color:var(--muted);margin-bottom:10px">All presentations will be recorded audio-video synchronized with motion picture of speaker.<br>PowerPoint presentations will be converted to PDF.</div>
    ${dTalks.length===0?'<div style="color:var(--muted);font-style:italic">No talks assigned to this doctor yet.</div>':
    `<table style="width:100%;border-collapse:collapse;font-size:11px">
      <tr style="background:#1a1916;color:#fff"><th style="padding:5px 6px;text-align:left">Date</th><th>As</th><th>Starts</th><th>Ends</th><th>Min.</th><th>Hall</th><th>Session</th><th>Type</th></tr>
      ${dTalks.map(t=>{const s=sessions.find(x=>x.id===t.sessionId);return`
      <tr><td style="border:1px solid #ddd;padding:4px 6px">${s?DAYS.find(d=>d.key===s.day).label:''}</td>
      <td style="border:1px solid #ddd;padding:4px 6px">Speaker</td>
      <td style="border:1px solid #ddd;padding:4px 6px;font-family:monospace">${t.start}</td>
      <td style="border:1px solid #ddd;padding:4px 6px;font-family:monospace">${t.end}</td>
      <td style="border:1px solid #ddd;padding:4px 6px">${t.duration}</td>
      <td style="border:1px solid #ddd;padding:4px 6px">${s?hallInfo(s.hall).name:''}</td>
      <td style="border:1px solid #ddd;padding:4px 6px">${s?s.num:''}</td>
      <td style="border:1px solid #ddd;padding:4px 6px">${s?s.type:''}</td></tr>
      <tr><td colspan="8" style="border:1px solid #ddd;padding:5px 6px">
        <span style="font-family:monospace;font-size:10px;color:var(--accent)">${t.code}</span> &nbsp;
        <b>${s?s.name:''}</b><br><i>${t.title}</i><br>
        <div style="display:flex;gap:16px;margin-top:5px;font-size:11px">
          <label style="display:flex;align-items:center;gap:5px;margin:0;text-transform:none;letter-spacing:0;cursor:pointer;color:var(--text)"><input type="radio" name="wc${t.code}" onchange="t.webcast=true"> YES, webcast my presentation</label>
          <label style="display:flex;align-items:center;gap:5px;margin:0;text-transform:none;letter-spacing:0;cursor:pointer;color:var(--text)"><input type="radio" name="wc${t.code}" onchange="t.webcast=false"> DO NOT webcast my presentation</label>
        </div>
      </td></tr>`;}).join('')}
    </table>`}
    <div style="border-top:1px solid #333;margin-top:24px;padding-top:6px;text-align:center;font-size:11px;color:var(--muted)">Signature:<br><br>${d.name}</div>
    <div style="margin-top:12px;text-align:right">
      <button class="btn btn-primary btn-sm" onclick="sendPrompt('Generate a printable PDF consent form for EOS 2026 for Dr. ${d.name} (ID: ${d.id}). Include all their talks.')">Export PDF ↗</button>
    </div>
  </div>`;
}

// PERSONAL
function renderPersonal(){
  document.getElementById('page-content').innerHTML=`
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
    <label style="text-transform:none;letter-spacing:0;margin:0;font-size:12px;display:inline;color:var(--text)">Doctor:</label>
    <select onchange="showPersonal(this.value)" style="width:260px">
      <option value="">— Select doctor —</option>

}

function showPersonal(drId){

  const d=doctors.find(x=>x.id===parseInt(drId));if(!d)return;

  document.getElementById('personal-out').innerHTML=`
  <div class="card">
    <div style="text-align:center;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)">
      <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)">Personal Schedule — EOS 2026</div>
      <div style="font-size:16px;font-weight:bold;margin:4px 0">${d.name}</div>
      ${d.email?`<div style="font-size:11px;color:var(--accent)">${d.email}</div>`:''}
      ${d.phone?`<div style="font-size:11px;font-family:monospace;color:var(--accent)">${d.phone}</div>`:''}
    </div>
    ${dTalks.length===0?'<div style="color:var(--muted);font-style:italic;text-align:center;padding:20px">No talks assigned yet.</div>':
    `<table style="width:100%;border-collapse:collapse;font-size:11px">
      <tr style="background:#1a1916;color:#fff"><th style="padding:5px 6px;text-align:left">Day</th><th>As</th><th>Start</th><th>End</th><th>Min.</th><th>Hall</th><th>Session</th></tr>
      ${dTalks.map(t=>{const s=sessions.find(x=>x.id===t.sessionId);return`
      <tr><td style="border:1px solid #ddd;padding:4px 6px">${s?DAYS.find(d=>d.key===s.day).label:''}</td>
      <td style="border:1px solid #ddd;padding:4px 6px;color:var(--accent2);font-weight:bold">Speaker</td>
      <td style="border:1px solid #ddd;padding:4px 6px;font-family:monospace">${t.start}</td>
      <td style="border:1px solid #ddd;padding:4px 6px;font-family:monospace">${t.end}</td>
      <td style="border:1px solid #ddd;padding:4px 6px">${t.duration}</td>
      <td style="border:1px solid #ddd;padding:4px 6px">${s?hallInfo(s.hall).name:''}</td>
      <td style="border:1px solid #ddd;padding:4px 6px">${s?'#'+s.num+' '+s.name.slice(0,35):''}</td></tr>
      <tr><td colspan="7" style="border:1px solid #ddd;padding:4px 6px;font-size:10px"><span style="font-family:monospace;color:var(--accent)">${t.code}</span> — <i>${t.title}</i></td></tr>`;}).join('')}
    </table>`}
    <div style="margin-top:12px;text-align:right;display:flex;justify-content:space-between;align-items:center">
      <span style="font-family:monospace;font-size:12px;font-weight:bold;color:var(--muted)">${d.name} · ${d.id}</span>
      <button class="btn btn-primary btn-sm" onclick="sendPrompt('Generate a PDF personal schedule for Dr. ${d.name} for EOS 2026.')">Export PDF ↗</button>
    </div>
  </div>`;
}

showPage('dashboard');
</script>
